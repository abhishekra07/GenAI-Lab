# ============================================================
# IMPORTANT: Never commit real API keys or passwords here.
# This file is committed to Git — keep it safe.
# Real secrets go in application-dev-local.yml (gitignored).
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/genailab
    username: genailab
    password: genailab_dev_password
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
genailab:
  storage:
    provider: minio
#    local:
#      base-path: ${LOCAL_STORAGE_PATH:./uploads}
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket-name: genailab-documents
      secure: false
  security:
    jwt:
      secret: dev-secret-key-only-for-local-development-not-for-production
      expiration-ms: 86400000
      refresh-expiration-ms: 604800000
logging:
  level:
    root: INFO
    com.genailab: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG