spring:
  application:
    name: genai-lab-backend

  # =========
  # DATABASE
  # =========
  datasource:
    url: jdbc:postgresql://localhost:5432/genailab
    username: genailab
    password: genailab
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: GenAiLabHikariPool
  jpa:
    # "validate" — Hibernate checks schema matches entities but never alters it.
    # Flyway owns the schema — JPA should never create or drop tables.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    # Disable open-in-view — prevents connection pool exhaustion under load
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    baseline-on-migrate: false
    validate-on-migrate: true

  # =============
  # FILE UPLOAD
  # =============
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  # ============================================================
  # SPRING AI — OpenAI auto-configuration
  # Spring AI reads these to create ChatModel and EmbeddingModel beans.
  # AiProviderRegistry uses those beans when initialising providers.
  # ============================================================
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2048
      embedding:
        options:
          # text-embedding-3-small = 1536 dimensions
          # This MUST match the vector(1536) column in document_embeddings
          model: text-embedding-3-small

# =============================
# GENAI LAB CUSTOM PROPERTIES
# =============================
genailab:

  # =================
  # AI CONFIGURATION
  # =================
  ai:
    # Default model used when a request does not specify one.
    # Must match a model_key in the ai_model_configs table.
    default-model: ${AI_DEFAULT_MODEL:gpt-4o-mini}
    providers:
      # ----------------------------------------------------------
      # OpenAI — https://platform.openai.com/api-keys
      # Provider is skipped at startup if api-key is empty.
      # ----------------------------------------------------------
      openai:
        enabled: true
        api-key: ${OPENAI_API_KEY:}
        base-url: https://api.openai.com
        chat-model: gpt-4o-mini
        embedding-model: text-embedding-3-small

      # ----------------------------------------------------------
      # Anthropic Claude — https://console.anthropic.com
      # Set enabled=true and provide ANTHROPIC_API_KEY when ready.
      # ----------------------------------------------------------
      anthropic:
        enabled: false
        api-key: ${ANTHROPIC_API_KEY:}
        base-url: https://api.anthropic.com
        chat-model: claude-3-5-sonnet-20241022

      # ----------------------------------------------------------
      # Ollama — local models, no API key required
      # Install: https://ollama.ai  then: ollama pull llama3.2
      # ----------------------------------------------------------
      ollama:
        enabled: false
        base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
        chat-model: llama3.2
        embedding-model: nomic-embed-text

      # ----------------------------------------------------------
      # Mock — development and testing ONLY
      # NEVER enable in production.
      # ----------------------------------------------------------
      mock:
        enabled: ${MOCK_AI_ENABLED:false}

  # =========
  # STORAGE
  # =========
  storage:
    # "local" or "minio" — selects which StorageService bean is used
    provider: ${STORAGE_PROVIDER:local}
    local:
      base-path: ${LOCAL_STORAGE_PATH:./uploads}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket-name: ${MINIO_BUCKET:genailab-documents}
      secure: false

  # ===============
  # SECURITY / JWT
  # ===============
  security:
    jwt:
      # Minimum 32 characters for HS256.
      # Generate a strong secret: openssl rand -base64 64
      secret: ${JWT_SECRET:your-very-secret-key-that-is-at-least-32-characters-long}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  # ============================================================
  # RAG PIPELINE
  # ============================================================
  rag:
    chunking:
      chunk-size: 512       # tokens per chunk (approx 4 chars/token = ~2048 chars)
      chunk-overlap: 50     # overlap between consecutive chunks
    retrieval:
      top-k: 5              # number of chunks retrieved per query
      similarity-threshold: 0.7  # minimum cosine similarity score

# ============================================================
# ACTUATOR & OBSERVABILITY
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENV:development}

# ============================================================
# LOGGING
# ============================================================
logging:
  level:
    root: INFO
    com.genailab: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ============================================================
# SERVER
# ============================================================
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    context-path: /