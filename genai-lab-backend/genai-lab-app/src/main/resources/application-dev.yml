spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/genailab
    username: genailab
    password: genailab_dev_password
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: false

  # ============================================================
  # SPRING AI — key comes from application-dev-local.yml
  # ============================================================
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

# ============================================================
# GENAI LAB CUSTOM PROPERTIES — DEV OVERRIDES
# ============================================================
genailab:
  ai:
    # -------------------------------------------------------
    # SWITCH HERE to change between mock and real AI:
    #   mock       — instant fake responses, no cost
    #   gpt-4o-mini — real OpenAI (requires key + credits)
    # -------------------------------------------------------
    default-model: gpt-4o-mini

    providers:
      # Mock always enabled in dev
      mock:
        enabled: true

      # OpenAI available in dev — needs key in application-dev-local.yml
      openai:
        enabled: true
        api-key: ${OPENAI_API_KEY:}

  # ============================================================
  # STORAGE — MinIO running in Docker
  # ============================================================
  storage:
    provider: minio
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin_dev_password
      bucket-name: genailab-documents
      secure: false

  # ============================================================
  # JWT — dev-only secret, safe to commit
  # ============================================================
  security:
    jwt:
      secret: dev-secret-key-only-for-local-development-not-for-production
      expiration-ms: 86400000
      refresh-expiration-ms: 604800000

  async:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 20
    thread-name-prefix: genailab-async-dev-

# ============================================================
# LOGGING — more verbose in dev
# ============================================================
logging:
  level:
    root: INFO
    com.genailab: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG