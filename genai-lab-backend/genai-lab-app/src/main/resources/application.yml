# ============================================================
# GenAI Lab — Application Configuration
# ============================================================
# This is the main configuration file loaded by Spring Boot.
# All values here can be overridden by:
#   1. Environment variables (SPRING_DATASOURCE_URL overrides spring.datasource.url)
#   2. application-{profile}.yml files (application-prod.yml for production)
#   3. System properties (-Dspring.datasource.url=...)
# ============================================================

spring:
  application:
    name: genai-lab-backend

  # ==========================
  # DATABASE CONFIGURATION
  # ==========================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:genailab}
    username: ${DB_USERNAME:genailab}
    password: ${DB_PASSWORD:genailab}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: GenAiLabHikariPool

  # ==============================
  # JPA / HIBERNATE CONFIGURATION
  # ==============================
  jpa:
    # "validate" — Hibernate checks schema matches entities but never alters it.
    # Flyway owns the schema. JPA should never create or drop tables.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    open-in-view: false

  # =============================
  # FLYWAY — DATABASE MIGRATIONS
  # =============================
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    baseline-on-migrate: false
    validate-on-migrate: true

  # ============
  # FILE UPLOAD
  # ============
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  # ============================
  # SPRING AI — OpenAI Provider
  # ============================
  ai:
    default-model: ${AI_DEFAULT_MODEL:gpt-4o-mini} #mock gpt-4o-mini
    mock:
      enabled: true
    openai:
      enabled: true
      api-key: ${OPENAI_API_KEY}
      chat-model: gpt-4o-mini
      embedding-model: text-embedding-3-small
    anthropic:
      enabled: false                        # flip to true when ready
      api-key: ${ANTHROPIC_API_KEY:}
      chat-model: claude-3-5-sonnet-20241022

# ============================
# GENAI LAB CUSTOM PROPERTIES
# ============================
genailab:
  storage:
    # "local" or "minio" — selects which StorageService bean is used
    provider: ${STORAGE_PROVIDER:local}
    local:
      base-path: ${LOCAL_STORAGE_PATH:./uploads}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket-name: ${MINIO_BUCKET:genailab-documents}
      secure: false

  security:
    jwt:
      # Minimum 32 characters for HS256. Generate with: openssl rand -base64 64
      secret: ${JWT_SECRET:your-very-secret-key-that-is-at-least-32-characters-long}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  rag:
    chunking:
      chunk-size: 512
      chunk-overlap: 50
    retrieval:
      top-k: 5
      similarity-threshold: 0.7

# =========================
# ACTUATOR & OBSERVABILITY
# =========================
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENV:development}

# ========
# LOGGING
# ========
logging:
  level:
    root: INFO
    com.genailab: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# =======
# SERVER
# =======
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    context-path: /